<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <!-- Critical for mobile responsiveness -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" th:href="@{/auth.css}" />

    <style>
        /* Base reset */
        * {
            box-sizing: border-box;
        }

        /* Page layout */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            color: #212529;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100svh; /* Mobile-safe height */
            padding: 1rem;
            margin: 0;
        }

        /* Auth container */
        .auth-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 24rem;
            padding: 2rem;
            border-radius: 0.75rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            border-top: 0.375rem solid #007749;
            transition: box-shadow 0.3s ease;
        }

        .auth-container:hover {
            box-shadow: 0 1rem 2rem rgba(0, 0, 0, 0.2);
        }

        /* Heading */
        h2 {
            text-align: center;
            color: #007749;
            margin-bottom: 1.5rem;
            font-size: 1.75rem;
            font-weight: 600;
        }

        /* Form layout */
        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 0.375rem;
            font-weight: 500;
            color: #495057;
        }

        /* Inputs */
        input[type="text"],
        input[type="password"] {
            padding: 0.75rem;
            margin-bottom: 1.25rem;
            min-height: 2.75rem; /* Touch-friendly */
            border-radius: 0.375rem;
            border: 1px solid #ced4da;
            background-color: #ffffff;
            color: #212529;
            font-size: 1rem; /* Prevents iOS zoom */
            transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
            box-shadow: inset 0 1px 1px rgba(0, 0, 0, 0.075);
        }

        input:focus {
            outline: none;
            border-color: #007749;
            box-shadow: 0 0 0 0.25rem rgba(0, 119, 73, 0.25);
        }

        input::placeholder {
            color: #6c757d;
        }

        /* Button */
        button {
            min-height: 2.75rem;
            padding: 0.75rem;
            background-color: #007749;
            color: #ffffff;
            font-weight: 600;
            border: none;
            border-radius: 0.375rem;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        button:hover {
            background-color: #005f3a;
            transform: scale(1.02);
        }

        /* Messages */
        .error {
            color: #dc3545;
            margin-bottom: 1rem;
            text-align: center;
            font-size: 0.875rem;
        }

        .success {
            color: #198754;
            margin-bottom: 1rem;
            text-align: center;
            font-size: 0.875rem;
        }

        /* Footer text */
        p {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.875rem;
        }

        a {
            color: #ffb612;
            font-weight: 500;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: #e6a00e;
            text-decoration: underline;
        }

        /* Mobile fine-tuning */
        @media (max-width: 480px) {
            h2 {
                font-size: 1.5rem;
            }

            .auth-container {
                padding: 1.75rem 1.25rem;
            }

            label {
                font-size: 0.875rem;
            }

            p {
                font-size: 0.8125rem;
            }
        }
    </style>
</head>

<body>

<div class="auth-container">
    <h2>Login</h2>

    <!-- Feedback messages -->
    <div th:if="${param.error}" class="error">
        Invalid username or password.
    </div>

    <div th:if="${param.logout}" class="success">
        You have been logged out successfully.
    </div>

    <form th:action="@{/login}" method="post">
        <label for="username">Username</label>
        <input id="username" type="text" name="username" placeholder="Enter your username" required>

        <label for="password">Password</label>
        <input id="password" type="password" name="password" placeholder="Enter your password" required>

        <button type="submit">Login</button>
    </form>

    <p>
        Don't have an account?
        <a th:href="@{/register}">Register here</a>
    </p>
</div>

</body>
</html>
